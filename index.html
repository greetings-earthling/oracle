<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Alien Luck Tablet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="page">

    <main class="tablet" aria-label="Alien tablet dashboard">
      <!-- Row 1 -->
      <section class="grid row1">
        <article class="widget" id="w-wisdom">
          <div class="wHead">
            <h2 class="wTitle">Cosmic Wisdom</h2>
            <p class="wSub" id="sub-wisdom">Tap to receive a directive.</p>
            <button class="wBtn" id="btn-wisdom" type="button" aria-label="Reveal cosmic wisdom"></button>
          </div>
          <div class="wBody">
            <div class="wResult mono" id="res-wisdom" aria-live="polite"></div>
          </div>
        </article>

        <article class="widget" id="w-aura">
          <div class="wHead">
            <h2 class="wTitle">Luck Aura</h2>
            <p class="wSub" id="sub-wisdom">Tap to receive a directive.</p>
            <button class="wBtn" id="btn-aura" type="button" aria-label="Reveal luck aura"></button>
          </div>
          <div class="wBody">
            <div class="wResult" id="res-aura" aria-live="polite"></div>
            <div class="auraBar" aria-hidden="true">
              <div class="auraFill" id="auraFill"></div>
            </div>
          </div>
        </article>
      </section>

      <!-- Row 2 -->
      <section class="grid row2">
        <article class="widget small" id="w-colour">
          <div class="wHead">
            <h2 class="wTitle">Lucky Colour</h2>
            <p class="wSub" id="sub-wisdom">Tap to receive a directive.</p>
            <button class="wBtn" id="btn-colour" type="button" aria-label="Reveal lucky colour"></button>
          </div>
          <div class="wBody">
            <div class="wResult" id="res-colour" aria-live="polite"></div>
            <div class="swatch" id="swatch" aria-hidden="true"></div>
          </div>
        </article>

                <article class="hub" aria-label="Device hub">
          <div class="hubGlow" aria-hidden="true"></div>
          <div class="hubMark" aria-hidden="true"></div>
          <div class="hubText">
            <div class="hubName">NEILA UNIT</div>
            <div class="hubId">Directive Console</div>
          </div>
        </article>
      </section>
      
        <article class="widget small" id="w-number">
          <div class="wHead">
            <h2 class="wTitle">Lucky Number</h2>
            <p class="wSub" id="sub-wisdom">Tap to receive a directive.</p>
            <button class="wBtn" id="btn-number" type="button" aria-label="Reveal lucky number"></button>
          </div>
          <div class="wBody">
            <div class="wResult big" id="res-number" aria-live="polite"></div>
          </div>
        </article>

      <!-- Row 3 -->
      <section class="grid row3">
        <article class="widget" id="w-meal">
          <div class="wHead">
            <h2 class="wTitle">Earth Meal</h2>
            <p class="wSub" id="sub-wisdom">Tap to receive a directive.</p>
            <button class="wBtn" id="btn-meal" type="button" aria-label="Reveal earth meal"></button>
          </div>
          <div class="wBody">
            <div class="wResult" id="res-meal" aria-live="polite"></div>
          </div>
        </article>

        <article class="widget" id="w-watch">
          <div class="wHead">
            <h2 class="wTitle">Earth Entertainment</h2>
            <p class="wSub" id="sub-wisdom">Tap to receive a directive.</p>
            <button class="wBtn" id="btn-watch" type="button" aria-label="Reveal earth entertainment"></button>
          </div>
          <div class="wBody">
            <div class="wResult" id="res-watch" aria-live="polite"></div>
            <div class="wMeta" id="meta-watch"></div>
          </div>
        </article>
      </section>
    </main>
  </div>

  <!-- Lists -->
  <script defer src="watchlist.js"></script>
  <script defer src="dinnerlist.js"></script>
  <script defer src="wisdomlist.js"></script>

  <!-- Core -->
  <script defer src="script.js"></script>

  <!-- Widgets (one file per widget) -->
  <script defer src="widgets/cosmicWisdom.js"></script>
  <script defer src="widgets/luckAura.js"></script>
  <script defer src="widgets/luckyColour.js"></script>
  <script defer src="widgets/luckyNumber.js"></script>
  <script defer src="widgets/earthMeal.js"></script>
  <script defer src="widgets/earthEntertainment.js"></script>
</body>
</html>
